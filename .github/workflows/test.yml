name: tests

on:
  push:
  pull_request:

jobs:
  forge-test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - contracts/agent-bond
          - contracts/stream-pay
          - contracts/commit-stake
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge-std
        run: git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Build
        run: forge build

      # Full suite: unit + adversarial + fuzz (10,000 runs) + invariant (10,000 runs x depth 15)
      - name: Test
        run: forge test -vv
