name: static-analysis

# Two jobs:
#   * `static` (Phase-1 primitives: agent-bond, stream-pay, commit-stake) — INFORMATIONAL. These
#     already-audited contracts surface only triaged false-positives (reentrancy closed by the
#     per-entry nonReentrant mutex + trusted-token callees; timestamp/low-level-call by-design,
#     see each STATIC_ANALYSIS / triage). Reports upload as artifacts; the gate is `tests`.
#   * `static-gate-commit-stake-v2` — GATING. commit-stake-v2 carries inline
#     `// slither-disable-next-line <detector>` directives for every by-design finding (one truth
#     with STATIC_ANALYSIS.md), so `slither --fail-pedantic` is 0 results / exit 0 today and goes
#     RED only on a NEW, un-accepted finding. This is a real signal, not `slither || true`.

on:
  push:
  pull_request:

jobs:
  static:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - contracts/agent-bond
          - contracts/stream-pay
          - contracts/commit-stake
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge-std
        run: git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither + solc 0.8.24
        run: |
          pipx install slither-analyzer
          pipx install solc-select
          solc-select install 0.8.24
          solc-select use 0.8.24

      - name: Slither (informational)
        id: slither
        continue-on-error: true
        run: slither . --exclude-dependencies --checklist > slither-report.md 2>&1 || true

      - name: Aderyn (informational)
        continue-on-error: true
        run: npx -y @cyfrin/aderyn@0.6.8 --src src -o aderyn-report.md . || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-${{ strategy.job-index }}
          path: |
            ${{ matrix.project }}/slither-report.md
            ${{ matrix.project }}/aderyn-report.md
          if-no-files-found: ignore

  # GATING Slither for commit-stake-v2: in-source slither-disable directives suppress exactly the
  # by-design findings, so --fail-pedantic is green now and red on any NEW un-accepted finding.
  static-gate-commit-stake-v2:
    name: commit-stake-v2 (gating)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/commit-stake-v2
    steps:
      - uses: actions/checkout@v5

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install forge-std
        run: git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Slither + solc 0.8.24
        run: |
          pipx install slither-analyzer
          pipx install solc-select
          solc-select install 0.8.24
          solc-select use 0.8.24

      # No continue-on-error, no `|| true`: a NEW, un-suppressed finding fails the build.
      - name: Slither (gating, --fail-pedantic)
        run: slither . --exclude-dependencies --fail-pedantic
